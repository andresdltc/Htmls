<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación a comer</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin-top: 60px;
      background-color: #fff8f0;
      overflow: hidden;
    }

    h1 {
      font-size: 32px;
    }

    p {
      font-size: 24px;
    }

    button {
      padding: 20px 30px;
      font-size: 24px;
      margin: 15px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #si {
      background-color: #4CAF50;
      color: white;
    }

    #no {
      background-color: #f44336;
      color: white;
      position: absolute;
    }
  </style>
</head>

<body>

  <h1>🍔 Invitación a comer 🍕</h1>
  <p>¿Vamos a comer?</p>

  <button id="si">SI <3 </button>
  <button id="no">NO bro</button>

  <script>
    const noBtn = document.getElementById("no");
    const siBtn = document.getElementById("si");

    let size = 24;

    siBtn.addEventListener("click", () => {
      alert("Sabía que dirías que sí 😎🍽️");
    });

    function moverBoton() {
      const x = Math.random() * (window.innerWidth - 100);
      const y = Math.random() * (window.innerHeight - 100);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    // 👉 PC: huye cuando pasas el mouse
    noBtn.addEventListener("mouseover", moverBoton);

    // 👉 Móvil: huye cuando lo tocan
    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moverBoton();
    });

    // 👉 Click (si logran tocarlo 😈)
    noBtn.addEventListener("click", () => {
      alert("Intente de nuevo 😏");

      if (navigator.vibrate) {
        navigator.vibrate(100);
      }

      // Se hace más pequeño
      size -= 5;
      noBtn.style.fontSize = size + "px";
      noBtn.style.padding = (size / 2) + "px";

      // Cambia de color
      const colors = ["#f44336", "#ff9800", "#e91e63", "#9c27b0"];
      noBtn.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

      // Se mueve
      moverBoton();

      // Hace crecer el SI
      let currentSize = parseInt(window.getComputedStyle(siBtn).fontSize);
      siBtn.style.fontSize = (currentSize + 5) + "px";

      // Desaparece al final
      if (size <= 10) {
        noBtn.style.display = "none";
        alert("Ok… ya entendí 😏 es un SÍ 😂🍽️");
      }
    });
  </script>

</body>
</html>
