<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comida</title>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#ffd6e8,#e2d7ff);display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}
.card{background:#fff;padding:30px;border-radius:20px;max-width:900px;width:95%;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,.2)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.opt{padding:16px;border:2px solid #ff69b4;border-radius:14px;cursor:pointer}
.sel{background:#ff69b4;color:#fff}
#spin{display:none;margin-top:20px;padding:12px 24px;border:none;border-radius:30px;background:#ff69b4;color:#fff;font-size:18px;cursor:pointer}
canvas{display:none;margin:20px auto}
#result{font-size:26px;font-weight:bold;color:#d81b60}
</style></head>
<body><div class="card">
<h1>🍽️ Escoge hasta 3 comidas</h1>
<div class="grid" id="grid"></div>
<button id="spin">🎡 Girar ruleta</button>
<canvas id="wheel" width="420" height="420"></canvas>
<div id="result"></div>
</div>
<script>
const foods=["🍣 Sushi","🍜 Ramen","🥩 Carne","🍝 Comida Italiana","🍕 Pizza","🍔 Hamburguesas TOP","🌮 Comida Mexicana","💩 Caca"];
const grid=document.getElementById("grid"),sel=[];
foods.forEach(f=>{let d=document.createElement("div");d.className="opt";d.textContent=f;d.onclick=()=>{if(d.classList.contains("sel")){d.classList.remove("sel");sel.splice(sel.indexOf(f),1);}else{if(sel.length>=3){alert("Solo puedes escoger 3");return;}d.classList.add("sel");sel.push(f);}spin.style.display=sel.length==3?"inline-block":"none";};grid.appendChild(d);});
const spin=document.getElementById("spin"),c=document.getElementById("wheel"),ctx=c.getContext("2d");
spin.onclick=()=>{
grid.style.display="none";spin.style.display="none";c.style.display="block";
let ang=0,target=Math.floor(Math.random()*3),final=(Math.PI*2*8)+(Math.PI*2/3)*(3-target);
function draw(a){
ctx.clearRect(0,0,420,420);
for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(210,210);ctx.arc(210,210,180,a+i*2*Math.PI/3,a+(i+1)*2*Math.PI/3);ctx.fillStyle=["#ff8ec7","#8ed8ff","#c8a2ff"][i];ctx.fill();ctx.save();ctx.translate(210,210);ctx.rotate(a+(i+.5)*2*Math.PI/3);ctx.fillStyle="#000";ctx.fillText(sel[i],80,0);ctx.restore();}
ctx.beginPath();ctx.moveTo(210,10);ctx.lineTo(195,40);ctx.lineTo(225,40);ctx.fill();
}
function anim(){
ang+=0.15;
draw(ang);
if(ang<final){requestAnimationFrame(anim);}
else{document.getElementById("result").innerHTML="🎉 La suerte decidió:<br><br>"+sel[target]+"<br><br>💕 Paso por ti mañana a las <b>3:00 PM</b>";}}
anim();
};
</script></body></html>
