<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ruleta de comida</title>
  <style>
    :root {
      --rosa: #ff4f9a;
      --rosa-oscuro: #d81b60;
      --morado: #8f67ff;
      --texto: #30243a;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--texto);
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,.8), transparent 25%),
        radial-gradient(circle at 85% 80%, rgba(255,255,255,.65), transparent 24%),
        linear-gradient(135deg, #ffd4e6 0%, #eadcff 55%, #d8efff 100%);
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(94vw, 900px);
      padding: clamp(22px, 4vw, 38px);
      text-align: center;
      background: rgba(255,255,255,.93);
      border: 1px solid rgba(255,255,255,.7);
      border-radius: 28px;
      box-shadow: 0 22px 60px rgba(77, 37, 94, .22);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 46px);
    }

    .subtitle {
      margin: 0 0 26px;
      color: #765e80;
      font-size: clamp(15px, 2.4vw, 18px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .opt {
      padding: 16px 12px;
      border: 2px solid #ff8abd;
      border-radius: 16px;
      background: #fff;
      cursor: pointer;
      font-size: clamp(15px, 2.3vw, 18px);
      font-weight: 700;
      box-shadow: 0 7px 18px rgba(216, 27, 96, .08);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
      user-select: none;
    }

    .opt:hover {
      transform: translateY(-3px);
      box-shadow: 0 11px 22px rgba(216, 27, 96, .17);
    }

    .opt.sel {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--rosa), var(--morado));
      transform: scale(1.025);
    }

    #spin {
      display: none;
      margin-top: 24px;
      padding: 14px 28px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(135deg, var(--rosa), var(--morado));
      box-shadow: 0 12px 25px rgba(143, 103, 255, .3);
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
    }

    #spin:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 16px 30px rgba(143, 103, 255, .38);
    }

    .wheel-wrap {
      position: relative;
      display: none;
      width: min(82vw, 430px);
      margin: 22px auto 0;
    }

    #wheel {
      display: block;
      width: 100%;
      height: auto;
      filter: drop-shadow(0 16px 24px rgba(58, 34, 70, .22));
    }

    .pointer {
      position: absolute;
      z-index: 4;
      top: -4px;
      left: 50%;
      width: 0;
      height: 0;
      transform: translateX(-50%);
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 40px solid #2f2440;
      filter: drop-shadow(0 4px 4px rgba(0,0,0,.2));
    }

    #result {
      min-height: 40px;
      margin-top: 22px;
      color: var(--rosa-oscuro);
      font-size: clamp(22px, 4vw, 31px);
      font-weight: 900;
      line-height: 1.35;
    }

    .winner {
      display: inline-block;
      margin: 8px 0;
      padding: 8px 18px;
      color: #fff;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--rosa), var(--morado));
      animation: winnerPop .55s cubic-bezier(.2,.9,.3,1.35);
    }

    #haruBox {
      display: none;
      margin: 24px auto 0;
    }

    #haruBox.show {
      display: block;
      animation: zoomIn .85s cubic-bezier(.18,.89,.32,1.28) both;
    }

    #haruImage {
      display: block;
      width: min(100%, 480px);
      max-height: 430px;
      margin: 0 auto;
      object-fit: contain;
      border-radius: 22px;
      filter: drop-shadow(0 18px 24px rgba(61, 30, 73, .25));
    }

    #confetti {
      position: fixed;
      inset: 0;
      z-index: 10;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    @keyframes zoomIn {
      0% { opacity: 0; transform: scale(.18) rotate(-7deg); }
      65% { opacity: 1; transform: scale(1.08) rotate(2deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }

    @keyframes winnerPop {
      from { opacity: 0; transform: scale(.5); }
      to { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 620px) {
      body { padding: 12px; align-items: flex-start; }
      .card { margin: 12px 0; border-radius: 22px; }
      .grid { grid-template-columns: 1fr; }
      .opt { padding: 14px 10px; }
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <main class="card">
    <h1>🍽️ Escoge 3 comidas</h1>
    <p class="subtitle">Selecciona tus favoritas y deja que la suerte decida.</p>

    <div class="grid" id="grid"></div>
    <button id="spin" type="button">🎡 Girar ruleta</button>

    <div class="wheel-wrap" id="wheelWrap">
      <div class="pointer" aria-hidden="true"></div>
      <canvas id="wheel" width="460" height="460"></canvas>
    </div>

    <div id="result" aria-live="polite"></div>

    <div id="haruBox">
      <img id="haruImage" src="Haru.png" alt="Haru">
    </div>
  </main>

  <script>
    const foods = [
      "🍣 Sushi",
      "🍜 Ramen",
      "🥩 Carne",
      "🍝 Comida Italiana",
      "🍕 Pizza",
      "🍔 Hamburguesas TOP",
      "🌮 Comida Mexicana",
      "💩 Caca"
    ];

    const grid = document.getElementById("grid");
    const spin = document.getElementById("spin");
    const wheelWrap = document.getElementById("wheelWrap");
    const wheel = document.getElementById("wheel");
    const ctx = wheel.getContext("2d");
    const result = document.getElementById("result");
    const haruBox = document.getElementById("haruBox");
    const selected = [];

    foods.forEach(food => {
      const option = document.createElement("div");
      option.className = "opt";
      option.textContent = food;

      option.addEventListener("click", () => {
        const isSelected = option.classList.contains("sel");

        if (isSelected) {
          option.classList.remove("sel");
          selected.splice(selected.indexOf(food), 1);
        } else {
          if (selected.length >= 3) {
            alert("Solo puedes escoger 3 comidas.");
            return;
          }
          option.classList.add("sel");
          selected.push(food);
        }

        spin.style.display = selected.length === 3 ? "inline-block" : "none";
      });

      grid.appendChild(option);
    });

    function drawWheel(rotation) {
      const center = wheel.width / 2;
      const radius = center - 28;
      const slice = (Math.PI * 2) / selected.length;
      const colors = ["#ff79b6", "#75cfff", "#b691ff"];

      ctx.clearRect(0, 0, wheel.width, wheel.height);

      selected.forEach((food, index) => {
        const start = rotation + index * slice;
        const end = start + slice;

        ctx.beginPath();
        ctx.moveTo(center, center);
        ctx.arc(center, center, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = colors[index];
        ctx.fill();

        ctx.lineWidth = 5;
        ctx.strokeStyle = "#ffffff";
        ctx.stroke();

        ctx.save();
        ctx.translate(center, center);
        ctx.rotate(start + slice / 2);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#2f2440";
        ctx.font = "bold 20px Arial";

        const text = food.length > 19 ? food.replace(" ", "\n") : food;
        const lines = text.split("\n");
        lines.forEach((line, lineIndex) => {
          ctx.fillText(line, radius * .58, (lineIndex - (lines.length - 1) / 2) * 24);
        });
        ctx.restore();
      });

      ctx.beginPath();
      ctx.arc(center, center, 31, 0, Math.PI * 2);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
      ctx.lineWidth = 7;
      ctx.strokeStyle = "#2f2440";
      ctx.stroke();
    }

    function easeOutQuint(t) {
      return 1 - Math.pow(1 - t, 5);
    }

    spin.addEventListener("click", () => {
      grid.style.display = "none";
      spin.style.display = "none";
      wheelWrap.style.display = "block";
      result.innerHTML = "";
      haruBox.classList.remove("show");
      haruBox.style.display = "none";

      const winnerIndex = Math.floor(Math.random() * selected.length);
      const slice = (Math.PI * 2) / selected.length;
      const pointerAngle = -Math.PI / 2;
      const winnerCenterAtZero = winnerIndex * slice + slice / 2;
      const extraTurns = Math.PI * 2 * 8;
      const finalRotation = extraTurns + pointerAngle - winnerCenterAtZero;
      const duration = 4800;
      const startTime = performance.now();

      function animate(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const rotation = finalRotation * easeOutQuint(progress);
        drawWheel(rotation);

        if (progress < 1) {
          requestAnimationFrame(animate);
          return;
        }

        result.innerHTML = `🎉 La suerte decidió:<br><span class="winner">${selected[winnerIndex]}</span><br>💕 Te paso viendo a las <b>3:00 PM</b>`;
        launchConfetti();

        setTimeout(() => {
          haruBox.style.display = "block";
          requestAnimationFrame(() => haruBox.classList.add("show"));
        }, 900);
      }

      requestAnimationFrame(animate);
    });

    function launchConfetti() {
      const canvas = document.getElementById("confetti");
      const confettiCtx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;

      canvas.width = innerWidth * dpr;
      canvas.height = innerHeight * dpr;
      canvas.style.width = `${innerWidth}px`;
      canvas.style.height = `${innerHeight}px`;
      confettiCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const colors = ["#ff4f9a", "#8f67ff", "#62c7ff", "#ffd166", "#7ce3a1", "#ffffff"];
      const pieces = Array.from({ length: 180 }, () => ({
        x: Math.random() * innerWidth,
        y: -30 - Math.random() * innerHeight * .25,
        w: 6 + Math.random() * 8,
        h: 9 + Math.random() * 12,
        color: colors[Math.floor(Math.random() * colors.length)],
        speedY: 3 + Math.random() * 5,
        speedX: -2.5 + Math.random() * 5,
        rotation: Math.random() * Math.PI,
        rotationSpeed: -.18 + Math.random() * .36,
        sway: Math.random() * Math.PI * 2
      }));

      const start = performance.now();
      const duration = 4300;

      function frame(now) {
        confettiCtx.clearRect(0, 0, innerWidth, innerHeight);

        pieces.forEach(piece => {
          piece.y += piece.speedY;
          piece.x += piece.speedX + Math.sin(piece.sway + piece.y * .02) * .5;
          piece.rotation += piece.rotationSpeed;

          confettiCtx.save();
          confettiCtx.translate(piece.x, piece.y);
          confettiCtx.rotate(piece.rotation);
          confettiCtx.fillStyle = piece.color;
          confettiCtx.fillRect(-piece.w / 2, -piece.h / 2, piece.w, piece.h);
          confettiCtx.restore();
        });

        if (now - start < duration) {
          requestAnimationFrame(frame);
        } else {
          confettiCtx.clearRect(0, 0, innerWidth, innerHeight);
        }
      }

      requestAnimationFrame(frame);
    }

    window.addEventListener("resize", () => {
      if (wheelWrap.style.display === "block") drawWheel(0);
    });
  </script>
</body>
</html>
