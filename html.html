<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animación Bueno</title>

<style>
    body{
        margin:0;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        overflow:hidden;
        background:white;
    }

    h1{
        font-family:Arial, sans-serif;
        font-weight:bold;
        color:black;
        font-size:40px;
        animation: gigante 8s forwards;
        white-space: nowrap;
    }

    @keyframes gigante{
        from{
            transform: scale(1);
        }
        to{
            transform: scale(80);
        }
    }
</style>
</head>

<body>

<h1>bueno</h1>

</body>
</html>
